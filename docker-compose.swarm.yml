version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-marketdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-marketdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  backend:
    # Вариант A — локальный registry:
    # image: 192.168.1.10:5000/market-backend:latest
    # Вариант B — образ собран на каждой ноде:
    image: market-backend:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-marketdb}
      SECRET_KEY: ${SECRET_KEY:-changeme-secret-key}
    volumes:
      - uploads:/app/app/static/uploads
    networks:
      - app_net
    deploy:
      replicas: 3
      placement:
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s

  frontend:
    # image: 192.168.1.10:5000/market-frontend:latest
    image: market-frontend:latest
    ports:
      - "80:80"
    networks:
      - app_net
    deploy:
      replicas: 2
      placement:
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s

volumes:
  postgres_data:
  uploads:

networks:
  app_net:
    driver: overlay
    attachable: true
